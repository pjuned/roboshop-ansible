- name: catalogue
  hosts: catalogue
  become: yes
  tasks:
    - name: disable nodejs & enable nodejs
      ansible.builtin.shell: dnf module disable nodejs -y ; dnf module enable nodejs:18 -y

    - name: install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: creating roboshop user
      ansible.builtin.user:
        name: roboshop

    - name: create app dir
      ansible.builtin.file:
        path: /app
        state: directory

    - name: download catalogue Application
      ansible.builtin.get_url:
        url: https://roboshop-builds.s3.amazonaws.com/catalogue.zip
        dest: /tmp

    - name: extract catalogue application
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: Install dependencies
      ansible.builtin.command: npm install
      args:
          chdir: /app

    - name: copy catalogue service
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: daemon reload & start
      ansible.builtin.systemd_service:
        daemon_reload: true
      # lets start & enable daemon after data is loaded to avoid errors.


    - name: copy mongodb repo
      ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: install mongodb client
      ansible.builtin.package:
        - name: mongodb-org-shell
          state: present

    - name: get the categories count
      ansible.builtin.command: mongo --hostmongodb.devopsju.online --quiet --eval 'db=db.getSiblingDB("catalogue"); db.products.count()'
      register: product_count

    - name: print the count
      ansible.builtin.debug:
        msg: "product_count : {{product_count}}"

    - name: load catalogue data
      ansible.builtin.command: mongo --host mongodb.devopsju.online < /app/schema/catalogue.js


